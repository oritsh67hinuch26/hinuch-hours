<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2B4BAA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="חינוך ישראלי">
  <link rel="manifest" href="manifest.json">
  <title>חינוך ישראלי — דיווח שעות</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; color: #1a1a1a; direction: rtl; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
    .header { background: #2B4BAA; min-height: 60px; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; opacity: .8; margin-top: 2px; }
    .header-user { background: rgba(255,255,255,.2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: #fff; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; position: sticky; top: 60px; z-index: 9; }
    .tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: .2s; white-space: nowrap; border: none; background: none; font-family: inherit; }
    .tab.active { color: #2B4BAA; border-bottom: 2px solid #2B4BAA; font-weight: 500; }
    .content { padding: 16px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 16px; margin-bottom: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fff; color: #1a1a1a; font-family: inherit; direction: rtl; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2B4BAA; box-shadow: 0 0 0 2px rgba(15,110,86,.1); }
    textarea { resize: none; height: 60px; margin-top: 8px; }
    .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: .15s; font-family: inherit; }
    .btn-primary { background: #2B4BAA; color: #fff; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: #9aaad4; cursor: default; }
    .btn-ghost { background: transparent; border: 1px solid #ddd; color: #333; margin-top: 8px; }
    .entry-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: flex-start; }
    .entry-item:last-child { border-bottom: none; }
    .entry-main { flex: 1; }
    .entry-school { font-size: 14px; font-weight: 500; }
    .entry-act { font-size: 13px; color: #666; margin-top: 2px; }
    .entry-date { font-size: 12px; color: #999; margin-top: 2px; }
    .pill { background: #e8ecf8; color: #1a3080; border-radius: 20px; padding: 3px 10px; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: #f8f8f8; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 500; color: #2B4BAA; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .empty { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }
    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
    .login-logo { width: 64px; height: 64px; background: #2B4BAA; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; }
    .login-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: #888; margin-bottom: 28px; }
    .name-grid { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 340px; }
    .name-btn { padding: 14px 20px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fff; font-size: 15px; cursor: pointer; text-align: right; font-family: inherit; transition: .15s; }
    .name-btn:hover { border-color: #2B4BAA; background: #f0faf7; color: #2B4BAA; }
    .delete-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 4px; }
    .delete-btn:hover { color: #e55; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .summary-row:last-child { border-bottom: none; }
    .summary-name { font-size: 14px; font-weight: 500; }
    .bar-wrap { height: 4px; background: #f0f0f0; border-radius: 4px; margin-top: 5px; overflow: hidden; width: 140px; }
    .bar-fill { height: 100%; background: #2B4BAA; border-radius: 4px; }
    .bar-fill-b { background: #2952b3; }
    .summary-hours { font-size: 15px; font-weight: 600; color: #2B4BAA; text-align: left; }
    .summary-amount { font-size: 11px; color: #999; margin-top: 1px; text-align: left; }
    .grand-total { background: #2B4BAA; color: #fff; border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .gt-label { font-size: 13px; opacity: .85; }
    .gt-val { font-size: 18px; font-weight: 600; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .filter-row select { flex: 1; font-size: 13px; padding: 8px 10px; }
    .total-bar { background: #2B4BAA; color: #fff; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-hdr { font-size: 12px; font-weight: 500; color: #999; display: flex; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid #eee; margin-bottom: 4px; }
    .admin-entry { padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .admin-entry:last-child { border-bottom: none; }
    .price-hint { background: #e8ecf8; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 14px; color: #1a3080; }
    .saved-msg { text-align: center; padding: 40px 20px; }
    .spinner { text-align: center; padding: 30px; color: #999; font-size: 14px; }
    .month-sel { width: 100%; margin-bottom: 14px; }
    .error-msg { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 12px; font-size: 13px; color: #c00; margin-bottom: 12px; }
    
    /* עיצוב ייעודי למנוע בחירת שעות משופר */
    .hours-counter { display: flex; align-items: center; gap: 12px; justify-content: center; background: #fff; padding: 4px; border-radius: 8px; border: 1px solid #ddd; }
    .hours-btn { width: 48px; height: 42px; background: #e8ecf8; color: #2B4BAA; border: none; border-radius: 6px; font-size: 22px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .hours-btn.plus { background: #2B4BAA; color: #fff; }
    .hours-btn:active { transform: scale(0.95); }
    .hours-display { font-size: 18px; font-weight: 600; min-width: 70px; text-align: center; color: #1a1a1a; }

<script>
// ====================================================
// ⚡ הכנס כאן את כתובת ה-Apps Script שלך
// ====================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJe1M-ZnlYE-Ws-wzvUsEUw9ZX3lWqTNJpElzWmWEYFr4qFMd9jf34nAvWNw-XQFkd/exec";
// ====================================================

const INSTRUCTORS = ["אורית שטרית","מעיין זך","ענת דימנט","אמונה לנדאו"];
const SCHOOLS = ["סלעית","רמת כרמים","שבילי רעות","יחדיו","נתיבות","עלי זהב","אגף חינוך באר טוביה","תיכון באר טוביה","שדות- באר טוביה","ייעוץ לחינוך ישראלי"];
const ACTIVITIES = ["יום הדרכה","פגישות עבודה","אחר"];
const RATE = 440;

function fmtDate(d) { const p = d.split("-"); return `${p[2]}/${p[1]}`; }
function monthLabel(d) { return ["","ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"][parseInt(d.split("-")[1])]; }
function getTodayDateString() { return new Date().toISOString().split("T")[0]; }

// API calls
async function apiGet() {
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  return data.entries || [];
}
async function apiSave(entry) {
  const url = SCRIPT_URL + "?action=save&id=" + encodeURIComponent(entry.id)
    + "&instructor=" + encodeURIComponent(entry.instructor)
    + "&date=" + encodeURIComponent(entry.date)
    + "&school=" + encodeURIComponent(entry.school)
    + "&activity=" + encodeURIComponent(entry.activity)
    + "&hours=" + encodeURIComponent(entry.hours)
    + "&ts=" + encodeURIComponent(entry.ts);
  await fetch(url);
}
async function apiDelete(id, instructor, school) {
  const url = SCRIPT_URL + "?action=delete&id=" + encodeURIComponent(id) + "&instructor=" + encodeURIComponent(instructor) + "&school=" + encodeURIComponent(school);
  await fetch(url);
}

// ---- STATE ----
let state = { user: null, tab: 0, entries: [], loading: false, error: null, adminUnlocked: false, loginSelected: null, loginError: null };
let formState = { date: getTodayDateString(), school: "", actType: "", actFree: "", hours: "" };
let saved = false;

function createInvoice() {
  const fs = state.filterSchool || "";
  const fm = state.filterMonth || "";
  const filtered = state.entries.filter(e =>
    (!fs || e.school === fs) && (!fm || e.date.startsWith(fm))
  );
  const total = filtered.reduce((s,e) => s + parseFloat(e.hours), 0);
  const month = fm ? monthLabel(fm + "-01") + " " + fm.substring(0,4) : "לא צוין";
  const msg = "צרי דרישת תשלום עבור " + fs + " לחודש " + month + ". הנתונים:\n" +
    filtered.map(e => fmtDate(e.date) + " | " + e.instructor + " | " + e.activity + " | " + e.hours + " ש'").join("\n") +
    "\n\nסה\"כ: " + total + " שעות = ₪" + Math.round(total * RATE).toLocaleString();
  sendPrompt(msg);
}

function tabContent() {
  if (state.tab === 0) return addEntryHTML();
  if (state.tab === 1) return myEntriesHTML();
  if (state.tab === 2 && state.user==="אורית שטרית") return summaryHTML();
  return addEntryHTML();
}

function addEntryHTML() {
  if (saved) return `<div class="card saved-msg"><div style="font-size:40px;margin-bottom:12px">✓</div><div style="font-size:16px;font-weight:500;color:#2B4BAA">נשמר בהצלחה!</div></div>`;
  const f = formState;
  const canSave = f.school && f.actType && (f.actType !== "אחר" || f.actFree.trim()) && f.hours;
  const currentHours = parseFloat(f.hours) || 0;
  
  return `<div class="card">
    <div class="form-group">
      <label>תאריך</label>
      <input type="date" id="f-date" value="${f.date}" max="${getTodayDateString()}">
    </div>
    <div class="form-group"><label>גוף</label>
      <select id="f-school">
        <option value="">בחר גוף...</option>
        ${SCHOOLS.map(s=>`<option value="${s}"${f.school===s?" selected":""}>${s}</option>`).join("")}
      </select>
    </div>
    <div class="form-group"><label>סוג פעילות</label>
      <select id="f-act">
        <option value="">בחר פעילות...</option>
        ${ACTIVITIES.map(a=>`<option value="${a}"${f.actType===a?" selected":""}>${a}</option>`).join("")}
      </select>
      ${f.actType==="אחר"?`<textarea id="f-free" placeholder="תאר/י את הפעילות...">${f.actFree}</textarea>`:""}
    </div>
    
    <div class="form-group">
      <label>מספר שעות</label>
      <div class="hours-counter">
        <button type="button" class="hours-btn" onclick="updateHoursCount(-0.5)">-</button>
        <span class="hours-display">${currentHours === 0 ? 'בחר' : currentHours + " ש'"}</span>
        <button type="button" class="hours-btn plus" onclick="updateHoursCount(0.5)">+</button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="submitEntry()" ${!canSave?"disabled":""}>שמור דיווח</button>
  </div>`;
}

function updateHoursCount(amount) {
  let h = (parseFloat(formState.hours) || 0) + amount;
  if (h < 0) h = 0;
  if (h > 12) h = 12; // מגבלת שעות הגיונית מקסימלית ליום עבודה
  formState.hours = h === 0 ? "" : String(h);
  render();
}

function myEntriesHTML() {
  const mine = state.entries.filter(e => e.instructor === state.user).sort((a,b)=>b.ts-a.ts);
  if (state.loading) return `<div class="spinner">טוען...</div>`;
  if (!mine.length) return `<div class="empty">אין דיווחים עדיין</div>`;
  const total = mine.reduce((s,e)=>s+parseFloat(e.hours),0);
  return `
    <div class="stat-grid" style="grid-template-columns:1fr">
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">סה"כ שעות</div></div>
    </div>
    <div class="card">${mine.map(e=>`
      <div class="entry-item">
        <div class="entry-main">
          <div class="entry-school">${e.school}</div>
          <div class="entry-act">${e.activity}</div>
          <div class="entry-date">${fmtDate(e.date)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="pill">${e.hours}ש'</span>
          <button class="delete-btn" onclick="deleteEntry('${e.id}')">✕</button>
        </div>
      </div>`).join("")}
    </div>`;
}

function summaryHTML() {
  const entries = state.entries;
  if (state.loading) return `<div class="spinner">טוען...</div>`;
  if (!entries.length) return `<div class="empty">אין דיווחים עדיין</div>`;

  const months = [...new Set(entries.map(e=>e.date.substring(0,7)))].sort().reverse();
  const fm = state.filterMonth || "";
  const filtered = fm ? entries.filter(e=>e.date.startsWith(fm)) : entries;
  const total = filtered.reduce((s,e)=>s+parseFloat(e.hours),0);

  const byInst = {}; INSTRUCTORS.forEach(i=>{byInst[i]=0;}); filtered.forEach(e=>{if(byInst[e.instructor]!==undefined)byInst[e.instructor]+=parseFloat(e.hours);});
  const maxInst = Math.max(...Object.values(byInst),1);

  const bySchool = {}; filtered.forEach(e=>{bySchool[e.school]=(bySchool[e.school]||0)+parseFloat(e.hours);});
  const schoolList = Object.entries(bySchool).sort((a,b)=>b[1]-a[1]);
  const maxSchool = Math.max(...schoolList.map(x=>x[1]),1);

  return `
    <select class="month-sel" onchange="setFilterMonth(this.value)">
      <option value="">כל התקופה</option>
      ${months.map(m=>`<option value="${m}"${fm===m?" selected":""}>${monthLabel(m+"-01")} ${m.substring(0,4)}</option>`).join("")}
    </select>
    <div class="grand-total">
      <span class="gt-label">סה"כ שעות לתשלום</span>
      <span class="gt-val">${total}ש' · ₪${Math.round(total*RATE).toLocaleString()}</span>
    </div>
    <div class="card">
      <div class="section-hdr"><span>לפי מנחה</span><span>שעות</span></div>
      ${INSTRUCTORS.map(inst=>{
        const h = byInst[inst]||0;
        return `<div class="summary-row">
          <div style="flex:1;min-width:0">
            <div class="summary-name">${inst}</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(h/maxInst*100)}%"></div></div>
          </div>
          <div style="min-width:80px;text-align:left">
            <div class="summary-hours">${h}ש'</div>
            <div class="summary-amount">₪${Math.round(h*RATE).toLocaleString()}</div>
          </div>
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <div class="section-hdr"><span>לפי גוף</span><span>שעות</span></div>
      ${schoolList.length===0?`<div class="empty" style="padding:12px">אין נתונים</div>`:schoolList.map(([school,h])=>`
        <div class="summary-row">
          <div style="flex:1;min-width:0">
            <div class="summary-name">${school}</div>
            <div class="bar-wrap"><div class="bar-fill bar-fill-b" style="width:${Math.round(h/maxSchool*100)}%"></div></div>
          </div>
          <div style="min-width:80px;text-align:left">
            <div class="summary-hours" style="color:#2952b3">${h}ש'</div>
            <div class="summary-amount">₪${Math.round(h*RATE).toLocaleString()}</div>
          </div>
        </div>`).join("")}
    </div>`;
}

// ---- ACTIONS ----
function selectUser(name) {
  if (name === "אורית שטרית") {
    state.user = name;
    state.loginSelected = null;
    state.adminUnlocked = true;
    loadEntries();
    render();
    return;
  }
  state.loginSelected = name;
  state.loginError = null;
  render();
  setTimeout(() => { const el = document.getElementById('login-pass'); if(el) el.focus(); }, 50);
}
function backToNames() {
  state.loginSelected = null;
  state.loginError = null;
  render();
}
function tryLogin() {
  const passwords = {"מעיין זך":"001","ענת דימנט":"002","אמונה לנדאו":"003"};
  const val = document.getElementById('login-pass') ? document.getElementById('login-pass').value : '';
  if (val === passwords[state.loginSelected]) {
    state.loginError = null;
    state.user = state.loginSelected;
    state.loginSelected = null;
    loadEntries();
    render();
  } else {
    state.loginError = "סיסמה שגויה. נסי שוב.";
    render();
    setTimeout(() => { const el = document.getElementById('login-pass'); if(el) { el.focus(); el.select(); } }, 50);
  }
}
function logout() { state.user = null; state.tab = 0; state.loginSelected = null; state.loginError = null; render(); }
function setTab(i) { state.tab = i; render(); }
function setFilterMonth(v) { state.filterMonth = v; render(); }

function attachEvents() {
  ["f-date","f-school","f-act","f-free"].forEach(id=>{
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("change", e=>{
      if(id==="f-date") formState.date=e.target.value;
      if(id==="f-school") formState.school=e.target.value;
      if(id==="f-act") { formState.actType=e.target.value; render(); }
      if(id==="f-free") formState.actFree=e.target.value;
      if(id!=="f-act") render();
    });
  });
}

async function submitEntry() {
  const f = formState;
  const actLabel = f.actType === "אחר" ? f.actFree : f.actType;
  const entry = { id: Date.now(), instructor: state.user, date: f.date, school: f.school, activity: actLabel, hours: parseFloat(f.hours), ts: Date.now() };
  
  // הגנה ראשונית - דחיפה מיידית לזיכרון התצוגה המקומי
  state.entries.push(entry);
  saved = true; 
  render();
  
  // ניסיון שליחה לשרת של גוגל
  try {
    await apiSave(entry);
  } catch (err) {
    console.error("שגיאה בסנכרון הנתונים מול גוגל שורט, אך הדיווח נשמר זמנית במסך.", err);
  }
  
  formState = { date: getTodayDateString(), school: "", actType: "", actFree: "", hours: "" };
  setTimeout(()=>{ saved=false; render(); }, 1500);
}

async function deleteEntry(id) {
  const entry = state.entries.find(e=>String(e.id)===String(id));
  if (!entry) return;
  if (!confirm("למחוק את הדיווח?\n" + entry.school + " · " + entry.activity + " · " + entry.hours + " ש'")) return;
  state.entries = state.entries.filter(e=>String(e.id)!==String(id));
  render();
  await apiDelete(id, entry.instructor, entry.school);
}

async function loadEntries() {
  state.loading = true; render();
  try {
    state.entries = await apiGet();
  } catch(e) {
    state.error = "שגיאה בטעינת נתונים";
  }
  state.loading = false; render();
}

render();
</script>
