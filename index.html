<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מסלול אוסטריה 🇦🇹</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5B8E7D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="אוסטריה" />
  <link rel="apple-touch-icon" href="icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; }

    #install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #5B8E7D, #4A7C8E);
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(91,142,125,0.5);
      border: none;
      direction: rtl;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 4px 20px rgba(91,142,125,0.5); }
      50% { box-shadow: 0 4px 30px rgba(91,142,125,0.9); }
      100% { box-shadow: 0 4px 20px rgba(91,142,125,0.5); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <button id="install-banner">📲 הוסיפי למסך הבית</button>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="App.jsx"></script>

  <script>
    // נקה Service Workers ישנים
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
    // נקה cache ישן
    if ('caches' in window) {
      caches.keys().then(keys => {
        keys.forEach(key => caches.delete(key));
      });
    }
  </script>
  <script>
    // PWA install prompt
    let deferredPrompt;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = 'none';
      }
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
