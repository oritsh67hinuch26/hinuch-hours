<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2B4BAA">
  <title>חינוך ישראלי — דיווח שעות</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; color: #1a1a1a; direction: rtl; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
    .header { background: #2B4BAA; min-height: 60px; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-user { background: rgba(255,255,255,.2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: #fff; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; position: sticky; top: 60px; z-index: 9; }
    .tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: .2s; border: none; background: none; font-family: inherit; }
    .tab.active { color: #2B4BAA; border-bottom: 2px solid #2B4BAA; font-weight: 500; }
    .content { padding: 16px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 16px; margin-bottom: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fff; font-family: inherit; direction: rtl; }
    .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: .15s; font-family: inherit; }
    .btn-primary { background: #2B4BAA; color: #fff; }
    .btn-primary:disabled { background: #9aaad4; }
    .entry-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: flex-start; }
    .pill { background: #e8ecf8; color: #1a3080; border-radius: 20px; padding: 3px 10px; font-size: 13px; font-weight: 600; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: #f8f8f8; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 500; color: #2B4BAA; }
    .stat-label { font-size: 12px; color: #888; }
    .hours-counter { display: flex; align-items: center; gap: 12px; justify-content: center; background: #fff; padding: 4px; border-radius: 8px; border: 1px solid #ddd; }
    .hours-btn { width: 48px; height: 42px; background: #e8ecf8; color: #2B4BAA; border: none; border-radius: 6px; font-size: 22px; font-weight: 600; cursor: pointer; }
    .hours-btn.plus { background: #2B4BAA; color: #fff; }
    .hours-display { font-size: 18px; font-weight: 600; min-width: 70px; text-align: center; }
    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .name-btn { width: 100%; max-width: 300px; padding: 14px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 16px; cursor: pointer; text-align: right; }
    .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ====================================================
// הכתובת תוקנה כאן ונמצאת בשורה אחת רציפה:
// ====================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJe1M-ZnlYE-Ws-wzvUsEUw9ZX3lWqTNJpElzWmWEYFr4qFMd9jf34nAvWNw-XQFkd/exec";
// ====================================================

const INSTRUCTORS = ["אורית שטרית","מעיין זך","ענת דימנט","אמונה לנדאו"];
const SCHOOLS = ["סלעית","רמת כרמים","שבילי רעות","יחדיו","נתיבות","עלי זהב","אגף חינוך באר טוביה","תיכון באר טוביה","שדות- באר טוביה","ייעוץ לחינוך ישראלי"];
const ACTIVITIES = ["יום הדרכה","פגישות עבודה","אחר"];
const RATE = 440;

let state = { user: null, tab: 0, entries: [], loading: false, filterMonth: "" };
let formState = { date: new Date().toISOString().split("T")[0], school: "", actType: "", actFree: "", hours: "0" };

async function loadData() {
  state.loading = true; render();
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    state.entries = data.entries || [];
  } catch(e) { console.error("Error loading", e); }
  state.loading = false; render();
}

function render() {
  const root = document.getElementById("root");
  if (!state.user) {
    root.innerHTML = `<div class="login-wrap"><h2>חינוך ישראלי</h2><p style="margin-bottom:20px">בחרי שם:</p>
      ${INSTRUCTORS.map(n=>`<button class="name-btn" onclick="state.user='${n}';loadData();render()">${n}</button>`).join("")}
    </div>`;
    return;
  }

  root.innerHTML = `
    <div class="app">
      <div class="header">
        <div class="header-title">שלום, ${state.user}</div>
        <button class="header-user" onclick="state.user=null;render()">יציאה</button>
      </div>
      <div class="tabs">
        <button class="tab ${state.tab===0?'active':''}" onclick="state.tab=0;render()">+ דיווח</button>
        <button class="tab ${state.tab===1?'active':''}" onclick="state.tab=1;render()">הדיווחים שלי</button>
        ${state.user === "אורית שטרית" ? `<button class="tab ${state.tab===2?'active':''}" onclick="state.tab=2;render()">ריכוז</button>` : ''}
      </div>
      <div class="content">${getTabContent()}</div>
    </div>`;
}

function getTabContent() {
  if (state.tab === 0) return `
    <div class="card">
      <div class="form-group"><label>תאריך</label><input type="date" id="f-date" value="${formState.date}" max="${new Date().toISOString().split("T")[0]}" onchange="formState.date=this.value"></div>
      <div class="form-group"><label>גוף</label>
        <select onchange="formState.school=this.value"><option value="">בחרי...</option>
        ${SCHOOLS.map(s=>`<option value="${s}" ${formState.school===s?'selected':''}>${s}</option>`).join("")}</select>
      </div>
      <div class="form-group"><label>פעילות</label>
        <select onchange="formState.actType=this.value;render()"><option value="">בחרי...</option>
        ${ACTIVITIES.map(a=>`<option value="${a}" ${formState.actType===a?'selected':''}>${a}</option>`).join("")}</select>
        ${formState.actType==='אחר'?`<textarea placeholder="פירוט..." onchange="formState.actFree=this.value"></textarea>`:''}
      </div>
      <div class="form-group">
        <label>שעות</label>
        <div class="hours-counter">
          <button class="hours-btn" onclick="updateHours(-0.5)">-</button>
          <span class="hours-display">${formState.hours} ש'</span>
          <button class="hours-btn plus" onclick="updateHours(0.5)">+</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="save()">שמור דיווח</button>
    </div>`;

  if (state.tab === 1) {
    const mine = state.entries.filter(e => e.instructor === state.user);
    return `<div class="card">${mine.length ? mine.map(e=>`<div class="entry-item"><div><b>${e.school}</b><br><small>${e.date}</small></div><span class="pill">${e.hours} ש'</span></div>`).join("") : 'אין דיווחים'}</div>`;
  }

  if (state.tab === 2) {
    const total = state.entries.reduce((s,e)=>s+parseFloat(e.hours),0);
    return `
      <div class="stat-grid"><div class="stat"><div class="stat-val">${total}</div><div class="stat-label">סה"כ שעות</div></div>
      <div class="stat"><div class="stat-val">₪${(total*RATE).toLocaleString()}</div><div class="stat-label">סה"כ לתשלום</div></div></div>
      <div class="card">${INSTRUCTORS.map(ins=>{
        const h = state.entries.filter(e=>e.instructor===ins).reduce((s,e)=>s+parseFloat(e.hours),0);
        return `<div class="summary-row"><span>${ins}</span><b>${h} ש'</b></div>`;
      }).join("")}</div>`;
  }
}

function updateHours(v) {
  let h = parseFloat(formState.hours) + v;
  if (h < 0) h = 0;
  formState.hours = h.toString();
  render();
}

async function save() {
  if (!formState.school || !formState.actType || formState.hours === "0") return alert("מלאי את כל השדות");
  const entry = {
    id: Date.now(), instructor: state.user, date: formState.date, 
    school: formState.school, activity: formState.actType === "אחר" ? formState.actFree : formState.actType, 
    hours: formState.hours, ts: Date.now()
  };
  state.entries.push(entry);
  render();
  const url = SCRIPT_URL + "?action=save&" + new URLSearchParams(entry).toString();
  await fetch(url);
  formState.hours = "0";
  alert("נשמר בהצלחה!");
  state.tab = 1;
  render();
}

render();
</script>
</body>
</html>
